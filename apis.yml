    name: SportsAPI
    description: >-
      SportsAPI.com provides a sports data API marketplace and comparison engine
      for developers. Browse, filter, and compare sports data providers by pricing
      tier, sport coverage (NFL, NBA, MLB, Soccer, Cricket, Horse Racing), data
      categories (live scores, statistics, odds, fantasy projections), and vendor
      features. The platform lists providers including SportMonks, API-Sports,
      GoalServe, The Odds API, FantasyData, CricketAPI, EnetPulse, and AllSports API.
